<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta de Mesa</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--terracota:#c46a4a;
--terracotaSoft:#e6b8a2;
--arena:#f7f3ef;
--texto:#3a2f2a;
--dorado:#d6b36a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

h4{
font-family:'Great Vibes', cursive;
font-size:5rem;
color:var(--terracota);
font-weight:400;
}

body {
background:var(--arena);
color:var(--texto);
font-family:'Poppins',sans-serif;
overflow-x:hidden;
text-align: center; 
padding: 100px;  
}

input,select{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:1rem;
font-family:'Poppins',sans-serif;
}

button{
margin-top:30px;
padding:16px 40px;
border:none;
border-radius:40px;
background:var(--terracota);
color:white;
font-size:1rem;
cursor:pointer;
transition:.3s;
box-shadow:0 15px 35px rgba(0,0,0,.3);
font-family:'Poppins',sans-serif;
}

button:hover{
transform:translateY(-3px);
background:#aa593f;
box-shadow:0 0 18px rgba(214,179,106,.45);
}

#resultado { 
margin-top: 20px; 
font-size: 1.2em; 
color: #333; 
}

.divider{
width:90px;
height:2px;
background:linear-gradient(to right,var(--terracota),var(--dorado));
margin:25px auto;
border-radius:10px;
}
		
</style>
</head>
<body>
    <h4>Consulta tu Mesa</h4>
    <input id="buscar" placeholder="Escribe tu nombre"><br>
    <button onclick="buscarMesa()">Buscar Mesa</button>
	<div class="divider"></div>
    <div id="resultado"></div>
	<div id="mesa"></div>
    <script>
        <script src="app.js"></script>
    </script>
</body>
</html>
