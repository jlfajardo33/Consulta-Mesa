<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuentra tu Mesa | José & Daniela</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<style>
    :root{

--terracota:#C46A4A;
--terracotaHover:#B65B3A;
--arena:#F8F5F1;
--blanco:#FFFFFF;
--texto:#4D403B;
--gris:#8D817B;
--dorado:#D6B36A;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(180deg,#faf7f4,#f4ede7);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

color:var(--texto);

}

.card{

width:100%;
max-width:450px;

background:white;

padding:40px 30px;

border-radius:25px;

box-shadow:0 15px 40px rgba(0,0,0,.12);

animation:fade .8s;

}

h1{

font-family:'Great Vibes',cursive;

font-size:4rem;

color:var(--terracota);

text-align:center;

font-weight:400;

}

h2{

text-align:center;

margin-top:15px;

font-size:1.6rem;

font-weight:500;

}

.texto{

margin-top:15px;

text-align:center;

line-height:1.7;

color:var(--gris);

margin-bottom:30px;

}

.divider{

width:90px;

height:3px;

margin:20px auto;

background:linear-gradient(to right,var(--terracota),var(--dorado));

border-radius:20px;

}

input{

width:100%;

padding:16px;

border-radius:15px;

border:2px solid #e8ddd5;

outline:none;

font-size:16px;

transition:.3s;

}

input:focus{

border-color:var(--terracota);

box-shadow:0 0 15px rgba(196,106,74,.25);

}

#resultados{

margin-top:25px;

}

.resultado{

padding:15px;

border-radius:15px;

background:#faf7f4;

margin-bottom:10px;

cursor:pointer;

transition:.25s;

border:1px solid #eee;

}

.resultado:hover{

background:var(--terracota);

color:white;

transform:translateY(-2px);

}

#mesa{

margin-top:25px;

}

.tarjeta{

background:white;

border-radius:20px;

padding:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.12);

animation:fade .5s;

}

.tarjeta h3{

font-family:'Great Vibes',cursive;

font-size:3rem;

color:var(--terracota);

font-weight:400;

}

.numeroMesa{

font-size:4rem;

font-weight:bold;

color:var(--terracota);

margin:20px 0;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@media(max-width:600px){

.card{

padding:30px 20px;

}

h1{

font-size:3.2rem;

}

.numeroMesa{

font-size:3.3rem;

}

}
</style>
<body>

<div class="background"></div>

<div class="card">

    <h1>José & Daniela</h1>

    <div class="divider"></div>

    <h2>Encuentra tu mesa</h2>

    <p class="texto">
        Escribe tu nombre o apellido para conocer el número de tu mesa.
    </p>

    <input
        type="text"
        id="buscar"
        placeholder="Empieza a escribir..."
        autocomplete="off">

    <div id="resultados"></div>

    <div id="mesa"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
    
</body>

</html>
